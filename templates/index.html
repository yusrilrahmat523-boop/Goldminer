<!DOCTYPE html>
<html>

<head>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

    <title>Gold Miner</title>

    <link rel="stylesheet"
          href="/static/css/style.css">

</head>

<body>

    <div class="container">

        <h1>
            ⛏ Gold Miner
        </h1>

<div class="card">

    <h2>
        👤 Profil
    </h2>

    <div id="playerStats">

        Loading...

    </div>

</div>
<div class="card">

    <h2>
        🎯 Daily Quest
    </h2>

    <div id="questInfo">

        Loading...

    </div>

    <br>
<div class="card">

    <h2>
        🛒 Shop
    </h2>

    <div id="shopItems">

        Loading Shop...

    </div>

</div>

<div class="card">

    <h2>
        🎒 Inventory
    </h2>

    <div id="inventoryList">

        Loading...

    </div>

</div>

<div class="card">

    <h2>
        🏆 Achievements
    </h2>

    <div id="achievementList">

        Loading...

    </div>

</div>

<div class="card">

    <h2>
        🎰 Lucky Wheel
    </h2>

    <div id="wheelInfo">
        Loading...
    </div>

    <br>

    <button id="spinWheelBtn">
        🎰 Spin Wheel
    </button>

</div>

    <button id="claimQuestBtn">

        Claim Quest Reward

    </button>

</div>

        <div class="card">

            <h2>
                Gold
            </h2>

            <div id="gold">
                0
            </div>

        </div>

        <div class="card">

            <div id="power">
                Power: 1
            </div>

        </div>

        <button id="mineBtn">
            ⛏ MINE
        </button>

        <button id="upgradeBtn">
            🚀 Upgrade Power
        </button>

<br><br>

<button id="speedBtn">
    ⚡ Upgrade Speed
</button>

        <button id="dailyBtn">
            🎁 Daily Reward
        </button>

<div class="card">

    <h2>
        🔥 Daily Streak
    </h2>

    <div id="streakInfo">
        Loading...
    </div>

    <br>

    <button id="claimStreakBtn">
        🎁 Claim Streak
    </button>

</div>

<button id="referralBtn">
    👥 Claim Referral
</button>

<div class="card">

    <h2>
        🏆 Leaderboard
    </h2>

    <div id="leaderboard">

        Loading...

    </div>

<div class="card">

    <h2>
        👥 Referral
    </h2>

    <div id="referralInfo">

        Loading...

    </div>

<br>

<button id="copyReferralBtn">
    📋 Copy Referral Link
</button>

</div>

</div>

    </div>

    <script src="/static/js/app.js"></script>

<div class="card">

    <h2>
        Telegram User Test
    </h2>

    <div id="telegramUserInfo">
        Loading...
    </div>

</div>

</body>
</html>
